{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Sprinto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#0f172a;">
  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-2.5 mb-4">
        <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-xs tracking-tight">SP</span>
        </div>
        <span class="text-white font-bold text-base tracking-tight">Sprinto</span>
      </div>
      <h1 class="text-xl font-bold text-white">Welcome back</h1>
      <p class="text-sm mt-1" style="color:#94a3b8;">Sign in to your account</p>
    </div>
    <div class="rounded-xl px-6 py-6" style="background:#1e293b; border:1px solid rgba(255,255,255,0.08);">
      {{if .Error}}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-xs rounded-lg px-3 py-2.5 mb-4">{{.Error}}</div>
      {{end}}
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="text-xs font-medium block mb-1.5" style="color:#94a3b8;">Email</label>
          <input name="email" type="email" required value="{{.Email}}" placeholder="you@company.com"
            class="w-full text-sm rounded-lg px-3 py-2.5 focus:outline-none transition-colors"
            style="background:#0f172a; border:1px solid rgba(255,255,255,0.1); color:#e2e8f0;"
            onfocus="this.style.borderColor='#7c3aed';this.style.boxShadow='0 0 0 1px #7c3aed'" onblur="this.style.borderColor='rgba(255,255,255,0.1)';this.style.boxShadow='none'"/>
        </div>
        <div>
          <label class="text-xs font-medium block mb-1.5" style="color:#94a3b8;">Password</label>
          <input name="password" type="password" required placeholder="••••••••"
            class="w-full text-sm rounded-lg px-3 py-2.5 focus:outline-none transition-colors"
            style="background:#0f172a; border:1px solid rgba(255,255,255,0.1); color:#e2e8f0;"
            onfocus="this.style.borderColor='#7c3aed';this.style.boxShadow='0 0 0 1px #7c3aed'" onblur="this.style.borderColor='rgba(255,255,255,0.1)';this.style.boxShadow='none'"/>
        </div>
        <button type="submit"
          class="w-full bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors mt-1">
          Sign In
        </button>
      </form>
    </div>
    <p class="text-center text-xs mt-5" style="color:#64748b;">
      Don't have an account?
      <a href="/register" class="text-violet-400 hover:text-violet-300 font-medium transition-colors">Create one</a>
    </p>
  </div>
</body>
</html>
{{end}}
