{{define "content"}}

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  .preview-md h1,.preview-md h2,.preview-md h3 { font-weight:700; margin-bottom:.4rem; }
  .preview-md h1 { font-size:1.15rem; }
  .preview-md h2 { font-size:1rem; }
  .preview-md h3 { font-size:.9rem; }
  .preview-md p  { margin-bottom:.55rem; font-size:.875rem; color:#374151; line-height:1.65; }
  .preview-md ul,.preview-md ol { padding-left:1.25rem; margin-bottom:.5rem; font-size:.875rem; color:#374151; }
  .preview-md li { margin-bottom:.2rem; }
  .preview-md ul { list-style:disc; }
  .preview-md ol { list-style:decimal; }
  .preview-md code { background:#e5e7eb; border-radius:3px; padding:.1rem .3rem; font-size:.8rem; font-family:monospace; }
  .preview-md pre  { background:#1f2937; color:#f9fafb; border-radius:.4rem; padding:.8rem; overflow-x:auto; margin-bottom:.5rem; }
  .preview-md pre code { background:none; padding:0; color:inherit; font-size:.8rem; }
  .preview-md blockquote { border-left:3px solid #d1d5db; padding-left:.75rem; color:#6b7280; font-style:italic; margin-bottom:.5rem; }
  .preview-md strong { font-weight:700; }
  .preview-md em { font-style:italic; }
  .preview-md a { color:#4f46e5; text-decoration:underline; }
  .preview-md hr { border:none; border-top:1px solid #e5e7eb; margin:.75rem 0; }
  .md-toolbar button { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:4px; color:#6b7280; transition:background .15s,color .15s; flex-shrink:0; }
  .md-toolbar button:hover { background:#f3f4f6; color:#111827; }
  .md-toolbar .sep { width:1px; height:18px; background:#e5e7eb; margin:0 2px; flex-shrink:0; }
</style>

<div class="mb-4">
  <a href="/notes" class="text-xs text-gray-400 hover:text-indigo-600 font-medium">← Sticky Notes</a>
</div>

<form method="POST" action="/notes">
  <!-- Title + Color bar -->
  <div class="bg-white rounded-lg border border-gray-200 px-5 py-4 mb-4 flex items-center gap-4">
    <input name="title" type="text" placeholder="Note title (optional)"
      class="flex-1 text-sm font-semibold border-[1.5px] border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-indigo-400"/>
    <div class="flex items-center gap-2">
      <span class="text-xs text-gray-400 font-medium">Color:</span>
      <label class="cursor-pointer" title="Yellow"><input type="radio" name="color" value="yellow" class="sr-only peer" checked><span class="block w-5 h-5 rounded-full bg-yellow-300 ring-2 ring-transparent peer-checked:ring-yellow-500 peer-checked:ring-offset-1 transition-all"></span></label>
      <label class="cursor-pointer" title="Green"><input type="radio" name="color" value="green" class="sr-only peer"><span class="block w-5 h-5 rounded-full bg-green-300 ring-2 ring-transparent peer-checked:ring-green-500 peer-checked:ring-offset-1 transition-all"></span></label>
      <label class="cursor-pointer" title="Blue"><input type="radio" name="color" value="blue" class="sr-only peer"><span class="block w-5 h-5 rounded-full bg-blue-300 ring-2 ring-transparent peer-checked:ring-blue-500 peer-checked:ring-offset-1 transition-all"></span></label>
      <label class="cursor-pointer" title="Pink"><input type="radio" name="color" value="pink" class="sr-only peer"><span class="block w-5 h-5 rounded-full bg-pink-300 ring-2 ring-transparent peer-checked:ring-pink-500 peer-checked:ring-offset-1 transition-all"></span></label>
      <label class="cursor-pointer" title="Purple"><input type="radio" name="color" value="purple" class="sr-only peer"><span class="block w-5 h-5 rounded-full bg-purple-300 ring-2 ring-transparent peer-checked:ring-purple-500 peer-checked:ring-offset-1 transition-all"></span></label>
    </div>
    <div class="flex items-center gap-2 ml-2">
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-md transition-colors">Save Note</button>
      <a href="/notes" class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2 rounded-md border border-gray-200 transition-colors">Cancel</a>
    </div>
  </div>

  <!-- Editor + Preview -->
  <div class="grid grid-cols-2 gap-4" style="height: calc(100vh - 220px);">
    <!-- Editor pane -->
    <div class="flex flex-col min-h-0">
      <div class="flex items-center justify-between mb-1.5">
        <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Markdown</p>
        <p class="text-[10px] text-gray-300">Ctrl+S to save</p>
      </div>
      <!-- Toolbar -->
      <div class="md-toolbar flex items-center gap-0.5 bg-white border-[1.5px] border-gray-200 border-b-0 rounded-t px-2 py-1.5 flex-wrap" data-for="note-content">
        <button type="button" data-action="bold" title="Bold (Ctrl+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-4 h-4"><path d="M6 4h8a4 4 0 010 8H6V4zm0 8h9a4 4 0 010 8H6v-8z"/></svg>
        </button>
        <button type="button" data-action="italic" title="Italic (Ctrl+I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-4 h-4"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
        </button>
        <button type="button" data-action="strike" title="Strikethrough">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><line x1="5" y1="12" x2="19" y2="12"/><path d="M16 6C16 6 14.5 4 12 4C9.5 4 7 5.5 7 8C7 10.5 9 11.5 12 12"/><path d="M8 18C8 18 9.5 20 12 20C14.5 20 17 18.5 17 16C17 14.5 16 13.5 14 13"/></svg>
        </button>
        <div class="sep"></div>
        <button type="button" data-action="h1" title="Heading 1">
          <span class="text-[11px] font-bold leading-none">H1</span>
        </button>
        <button type="button" data-action="h2" title="Heading 2">
          <span class="text-[11px] font-bold leading-none">H2</span>
        </button>
        <button type="button" data-action="h3" title="Heading 3">
          <span class="text-[11px] font-bold leading-none">H3</span>
        </button>
        <div class="sep"></div>
        <button type="button" data-action="ul" title="Bullet list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        </button>
        <button type="button" data-action="ol" title="Numbered list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke-linecap="round"/><path d="M4 10h2" stroke-linecap="round"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1.5" stroke-linecap="round"/></svg>
        </button>
        <button type="button" data-action="quote" title="Blockquote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <div class="sep"></div>
        <button type="button" data-action="code" title="Inline code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button type="button" data-action="codeblock" title="Code block">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 9l-3 3 3 3M16 9l3 3-3 3M13 7l-2 10"/></svg>
        </button>
        <div class="sep"></div>
        <button type="button" data-action="link" title="Link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        </button>
        <button type="button" data-action="hr" title="Horizontal rule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </button>
      </div>
      <textarea id="note-content" name="content" required
        placeholder="Write in Markdown...&#10;&#10;# Heading&#10;**bold**, *italic*, `code`&#10;&#10;- list item&#10;&#10;> blockquote"
        class="flex-1 w-full text-sm border-[1.5px] border-gray-200 rounded-b px-4 py-3 focus:outline-none focus:border-indigo-400 resize-none font-mono leading-relaxed"></textarea>
    </div>

    <!-- Preview pane -->
    <div class="flex flex-col min-h-0">
      <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Preview</p>
      <div id="note-preview"
        class="preview-md flex-1 rounded border-[1.5px] border-gray-100 bg-white px-5 py-4 overflow-auto">
        <span class="text-sm text-gray-400 italic">Start typing to see preview...</span>
      </div>
    </div>
  </div>
</form>

<script>
var textarea = document.getElementById('note-content');
var preview  = document.getElementById('note-preview');

function updatePreview() {
  var val = textarea.value.trim();
  preview.innerHTML = val ? marked.parse(val) : '<span class="text-sm text-gray-400 italic">Start typing to see preview...</span>';
}

textarea.addEventListener('input', updatePreview);

// ── Markdown toolbar ──────────────────────────────────────────────────
function mdWrap(before, after, placeholder) {
  var start = textarea.selectionStart, end = textarea.selectionEnd;
  var sel = textarea.value.substring(start, end) || placeholder;
  var replacement = before + sel + after;
  textarea.setRangeText(replacement, start, end, 'select');
  if (!textarea.value.substring(start, end)) {
    // move cursor inside markers
    textarea.selectionStart = start + before.length;
    textarea.selectionEnd   = start + before.length + placeholder.length;
  }
  textarea.focus();
  updatePreview();
}

function mdLinePrefix(prefix) {
  var start = textarea.selectionStart;
  var lineStart = textarea.value.lastIndexOf('\n', start - 1) + 1;
  var already = textarea.value.substring(lineStart).startsWith(prefix);
  if (already) {
    textarea.setRangeText('', lineStart, lineStart + prefix.length, 'end');
  } else {
    textarea.setRangeText(prefix, lineStart, lineStart, 'end');
  }
  textarea.focus();
  updatePreview();
}

document.querySelectorAll('.md-toolbar button[data-action]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var a = this.dataset.action;
    if      (a === 'bold')      mdWrap('**', '**', 'bold text');
    else if (a === 'italic')    mdWrap('*', '*', 'italic text');
    else if (a === 'strike')    mdWrap('~~', '~~', 'strikethrough');
    else if (a === 'h1')        mdLinePrefix('# ');
    else if (a === 'h2')        mdLinePrefix('## ');
    else if (a === 'h3')        mdLinePrefix('### ');
    else if (a === 'ul')        mdLinePrefix('- ');
    else if (a === 'ol')        mdLinePrefix('1. ');
    else if (a === 'quote')     mdLinePrefix('> ');
    else if (a === 'code')      mdWrap('`', '`', 'code');
    else if (a === 'codeblock') mdWrap('```\n', '\n```', 'code here');
    else if (a === 'link')      mdWrap('[', '](url)', 'link text');
    else if (a === 'hr')        { textarea.setRangeText('\n---\n', textarea.selectionStart, textarea.selectionEnd, 'end'); textarea.focus(); updatePreview(); }
  });
});

// Keyboard shortcuts
textarea.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'b') { e.preventDefault(); mdWrap('**', '**', 'bold text'); }
    if (e.key === 'i') { e.preventDefault(); mdWrap('*', '*', 'italic text'); }
    if (e.key === 'k') { e.preventDefault(); mdWrap('[', '](url)', 'link text'); }
  }
});

// Ctrl+S / Cmd+S to save
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    textarea.closest('form').submit();
  }
});
</script>

{{end}}
